<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Lekkerstemmen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #7C6FF7;
      --purple-light: #EEF0FF;
      --purple-dark: #5148D4;
      --teal: #22C9A0;
      --teal-light: #E0FAF4;
      --amber: #FFB830;
      --amber-light: #FFF4D6;
      --coral: #FF6B6B;
      --coral-light: #FFEEEE;
      --bg: #F7F6FF;
      --card: #FFFFFF;
      --text: #1A1A2E;
      --text-muted: #7B7A8E;
      --border: #ECEAF8;
      --radius: 20px;
      --radius-sm: 12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Nunito Sans', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ---- LAYOUT ---- */
    .app-shell {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 0 32px;
      position: relative;
    }

    /* ---- TOP BAR ---- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 12px;
    }
    .logo {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 22px;
      color: var(--purple);
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--text); }
    .avatar-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--purple-light);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif;
      font-weight: 800; font-size: 14px;
      color: var(--purple);
      transition: background 0.2s;
    }
    .avatar-btn:hover { background: #dddaff; }

    /* ---- CARDS ---- */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 24px;
      margin: 0 16px 16px;
    }
    .card-sm { padding: 16px 20px; }

    /* ---- BUTTONS ---- */
    .btn {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 16px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--purple);
      color: white;
      padding: 14px 28px;
      width: 100%;
      box-shadow: 0 4px 16px rgba(124,111,247,0.3);
    }
    .btn-primary:hover { background: var(--purple-dark); box-shadow: 0 6px 20px rgba(124,111,247,0.4); }
    .btn-primary:disabled { background: #C5C2F5; box-shadow: none; cursor: not-allowed; }
    .btn-secondary {
      background: var(--purple-light);
      color: var(--purple);
      padding: 12px 24px;
      width: 100%;
    }
    .btn-secondary:hover { background: #dddaff; }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      padding: 10px 16px;
      font-size: 14px;
    }

    /* ---- INPUTS ---- */
    .input-group { margin-bottom: 16px; }
    .input-label {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Nunito Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
    }
    .input:focus { border-color: var(--purple); background: white; }
    .input::placeholder { color: #C0BEDD; }

    /* ---- AUTH SCREEN ---- */
    .auth-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 24px;
    }
    .auth-hero {
      text-align: center;
      margin-bottom: 40px;
    }
    .auth-emoji {
      font-size: 64px;
      display: block;
      margin-bottom: 16px;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .auth-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 32px;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .auth-title span { color: var(--purple); }
    .auth-sub {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .auth-tabs {
      display: flex;
      background: var(--purple-light);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 9px;
      background: transparent;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: white;
      color: var(--purple);
      box-shadow: 0 2px 8px rgba(124,111,247,0.15);
    }
    .error-msg {
      background: var(--coral-light);
      color: var(--coral);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }
    .success-msg {
      background: var(--teal-light);
      color: #0F9E78;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
    }

    /* ---- SETUP SCREEN ---- */
    .setup-screen { flex: 1; padding: 24px 0; }
    .setup-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 26px;
      color: var(--text);
      padding: 0 24px;
      margin-bottom: 6px;
    }
    .setup-sub {
      font-size: 14px;
      color: var(--text-muted);
      padding: 0 24px;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .role-picker {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .role-card {
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
    }
    .role-card.selected {
      border-color: var(--purple);
      background: var(--purple-light);
    }
    .role-card-emoji { font-size: 36px; display: block; margin-bottom: 8px; }
    .role-card-label {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: var(--text);
    }
    .role-card-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ---- HOME SCREEN ---- */
    .home-screen { flex: 1; padding-top: 8px; }
    .greeting-block { padding: 8px 24px 20px; }
    .greeting {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 28px;
      color: var(--text);
      line-height: 1.2;
    }
    .greeting span { color: var(--purple); }
    .greeting-sub { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

    /* streak pill */
    .streak-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--amber-light);
      border: 1.5px solid #FFD97A;
      border-radius: 99px;
      padding: 6px 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 14px;
      color: #C47F00;
      margin-top: 12px;
    }

    /* today card */
    .today-card {
      background: linear-gradient(135deg, var(--purple) 0%, #9B8FF9 100%);
      border-radius: var(--radius);
      margin: 0 16px 16px;
      padding: 24px;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .today-card::after {
      content: '';
      position: absolute;
      right: -20px; top: -20px;
      width: 120px; height: 120px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    .today-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.8;
      margin-bottom: 6px;
    }
    .today-question {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 22px;
      line-height: 1.2;
      margin-bottom: 20px;
    }
    .today-done {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-weight: 700;
      font-size: 15px;
    }
    .btn-white {
      background: white;
      color: var(--purple);
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 15px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-white:hover { transform: scale(1.02); }

    /* section header */
    .section-header {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: var(--text);
      padding: 0 24px;
      margin-bottom: 12px;
    }

    /* week overview mini */
    .week-dots {
      display: flex;
      gap: 6px;
      padding: 0 24px;
      margin-bottom: 20px;
    }
    .week-dot-wrap { flex: 1; text-align: center; }
    .week-dot {
      width: 36px; height: 36px;
      border-radius: 50%;
      margin: 0 auto 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      border: 2px solid var(--border);
      background: white;
    }
    .week-dot.score-1 { background: var(--coral-light); border-color: #FFB5B5; }
    .week-dot.score-2 { background: var(--amber-light); border-color: #FFD97A; }
    .week-dot.score-3 { background: var(--teal-light); border-color: #7EECD4; }
    .week-dot-label { font-size: 10px; color: var(--text-muted); font-weight: 600; }

    /* parent overview */
    .insight-card {
      background: var(--purple-light);
      border-radius: var(--radius);
      margin: 0 16px 16px;
      padding: 20px;
      border: 1.5px solid #D8D4FF;
    }
    .insight-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--purple);
      margin-bottom: 6px;
    }
    .insight-text {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      line-height: 1.4;
    }

    /* ---- CHECKIN SCREEN ---- */
    .checkin-screen { flex: 1; padding: 16px 0 0; }
    .checkin-header {
      padding: 0 24px 24px;
      text-align: center;
    }
    .checkin-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 26px;
      color: var(--text);
      margin-bottom: 6px;
    }
    .checkin-sub { font-size: 14px; color: var(--text-muted); }

    .smiley-row {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 8px 24px 32px;
    }
    .smiley-btn {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 3px solid var(--border);
      background: white;
      font-size: 42px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .smiley-btn:hover { transform: scale(1.08); }
    .smiley-btn.selected-1 {
      border-color: var(--coral);
      background: var(--coral-light);
      transform: scale(1.12);
      box-shadow: 0 8px 24px rgba(255,107,107,0.25);
    }
    .smiley-btn.selected-2 {
      border-color: var(--amber);
      background: var(--amber-light);
      transform: scale(1.12);
      box-shadow: 0 8px 24px rgba(255,184,48,0.25);
    }
    .smiley-btn.selected-3 {
      border-color: var(--teal);
      background: var(--teal-light);
      transform: scale(1.12);
      box-shadow: 0 8px 24px rgba(34,201,160,0.25);
    }

    .drink-section { padding: 0 24px 24px; }
    .drink-label {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .drink-label .optional {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 99px;
    }
    .drink-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .drink-btn {
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
    }
    .drink-btn:hover { border-color: var(--purple); background: var(--purple-light); }
    .drink-btn.selected { border-color: var(--purple); background: var(--purple-light); color: var(--purple); }
    .drink-emoji { font-size: 22px; }

    .checkin-actions { padding: 0 24px; }

    /* ---- SUCCESS SCREEN ---- */
    .success-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .success-emoji {
      font-size: 80px;
      display: block;
      margin-bottom: 24px;
      animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .success-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 30px;
      color: var(--text);
      margin-bottom: 8px;
    }
    .success-sub { font-size: 15px; color: var(--text-muted); line-height: 1.6; margin-bottom: 32px; }

    /* ---- PARENT LOG SCREEN ---- */
    .parent-screen { flex: 1; padding: 16px 0; }

    .meal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .meal-btn {
      padding: 12px 8px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--text);
    }
    .meal-btn:hover { border-color: var(--teal); }
    .meal-btn.selected { border-color: var(--teal); background: var(--teal-light); color: #0F9E78; }
    .meal-emoji { font-size: 24px; display: block; margin-bottom: 4px; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: white;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      margin-bottom: 10px;
    }
    .toggle-info { display: flex; align-items: center; gap: 12px; }
    .toggle-icon { font-size: 22px; }
    .toggle-label { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 14px; color: var(--text); }
    .toggle-sub { font-size: 12px; color: var(--text-muted); }
    .toggle {
      width: 46px; height: 26px;
      border-radius: 13px;
      background: var(--border);
      border: none;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle.on { background: var(--teal); }
    .toggle::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .toggle.on::after { transform: translateX(20px); }

    /* ---- BOTTOM NAV ---- */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      background: white;
      border-top: 1.5px solid var(--border);
      display: flex;
      padding: 8px 0 20px;
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 0;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: color 0.2s;
      color: var(--text-muted);
    }
    .nav-item.active { color: var(--purple); }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 700; font-family: 'Nunito', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; }

    .pb-nav { padding-bottom: 88px; }

    /* ---- LOADING ---- */
    .loading {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--purple-light);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: 'Nunito', sans-serif; font-weight: 700; color: var(--text-muted); font-size: 15px; }

    /* ---- VOTE SCREEN ---- */
    .vote-screen { flex: 1; padding: 16px 0; }
    .vote-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      background: white;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .vote-option:hover { border-color: var(--amber); }
    .vote-option.selected { border-color: var(--amber); background: var(--amber-light); }
    .vote-option-emoji { font-size: 32px; }
    .vote-option-name { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 16px; color: var(--text); }
    .vote-option-sub { font-size: 12px; color: var(--text-muted); }
    .vote-check {
      margin-left: auto;
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      transition: all 0.2s;
    }
    .vote-option.selected .vote-check { background: var(--amber); border-color: var(--amber); color: white; }
    .vote-count { font-size: 13px; color: var(--text-muted); text-align: center; margin-bottom: 16px; }
    .vote-count span { color: var(--amber); font-weight: 800; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect, useCallback } = React;

// ── Constants ────────────────────────────────────────────────────
const MEALS = [
  { id: 'pasta',   emoji: '🍝', label: 'Pasta' },
  { id: 'rijst',   emoji: '🍚', label: 'Rijst' },
  { id: 'aardappelen', emoji: '🥔', label: 'Aardappelen' },

// ── Helpers ──────────────────────────────────────────────────────
function initials(name) {
  return name ? name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) : '?';
}
function todayStr() {
  return new Date().toISOString().split('T')[0];
}
function mondayOfWeek(d = new Date()) {
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff)).toISOString().split('T')[0];
}

// ── AUTH SCREEN ──────────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [tab, setTab] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');

  async function handleSubmit() {
    setError(''); setSuccess(''); setLoading(true);
    try {
      if (tab === 'login') {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        onAuth(data.user);
      } else {
        const { error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        setSuccess('Check je e-mail voor een bevestigingslink!');
      }
    } catch(e) {
      setError(e.message || 'Er ging iets mis.');
    }
    setLoading(false);
  }

  return (
    <div className="app-shell">
      <div className="auth-screen">
        <div className="auth-hero">
          <span className="auth-emoji">🍽️</span>
          <h1 className="auth-title">Lekker<span>stemmen</span></h1>
          <p className="auth-sub">Jij kiest wat er vanavond op tafel komt.</p>
        </div>

        <div className="auth-tabs">
          <button className={`auth-tab ${tab==='login'?'active':''}`} onClick={()=>setTab('login')}>Inloggen</button>
          <button className={`auth-tab ${tab==='signup'?'active':''}`} onClick={()=>setTab('signup')}>Aanmelden</button>
        </div>

        {error && <div className="error-msg">{error}</div>}
        {success && <div className="success-msg">{success}</div>}

        <div className="input-group">
          <label className="input-label">E-mailadres</label>
          <input className="input" type="email" placeholder="jouw@email.nl" value={email} onChange={e=>setEmail(e.target.value)} />
        </div>
        <div className="input-group">
          <label className="input-label">Wachtwoord</label>
          <input className="input" type="password" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)}

        </div>

        <button className="btn btn-primary" onClick={handleSubmit} disabled={loading || !email || !password}>
          {loading ? '...' : tab==='login' ? 'Inloggen →' : 'Account aanmaken →'}
        </button>
      </div>
    </div>
  );
}

// ── VOTE SCREEN ──────────────────────────────────────────────────
function VoteScreen({ profile, onDone }) {
  const [choices, setChoices] = useState([]);
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);

  function toggle(id) {
    setChoices(prev =>
      prev.includes(id)
        ? prev.filter(c=>c!==id)
        : prev.length < 2 ? [...prev, id] : prev
    );
  }

  async function handleVote() {
    if (choices.length !== 2) return;
    setLoading(true);
    await sb.from('votes').upsert({
      profile_id: profile.id,
      family_id: profile.family_id,
      week_of: mondayOfWeek(),
      meal_choice_1: choices[0],
      meal_choice_2: choices[1],
    }, { onConflict: 'profile_id,week_of' });
    setLoading(false);
    setDone(true);
    setTimeout(onDone, 1800);
  }

  if (done) return (
    <div className="success-screen">
      <span className="success-emoji" style={{animation:'pop 0.4s cubic-bezier(0.34,1.56,0.64,1)'}}>🗳️</span>
      <h2 className="success-title">Stem uitgebracht!</h2>
      <p className="success-sub">Jouw keuzes worden meegenomen in het menu van volgende week.</p>
    </div>
  );

  return (
    <div className="vote-screen pb-nav">
      <div className="topbar" style={{paddingBottom:8}}>
        <h2 style={{fontFamily:'Nunito',fontWeight:900,fontSize:22}}>Kies voor volgende week 🗳️</h2>
      </div>
      <p className="vote-count" style={{padding:'0 24px'}}>
        Kies <span>{2 - choices.length}</span> maaltijd{choices.length===1?'':'en} nog
      </p>
      <div style={{padding:'0 16px'}}>
        {VOTE_OPTIONS.map(opt => (
          <div key={opt.id}
            className={`vote-option ${choices.includes(opt.id)?'selected':''}`}
            onClick={()=>toggle(opt.id)}
          >
            <span className="vote-option-emoji">{opt.emoji}</span>
            <div>
              <div className="vote-option-name">{opt.label}</div>
              <div className="vote-option-sub">{opt.sub}</div>
            </div>
            <div className="vote-check">{choices.includes(opt.id)?'✓':''}</div>
          </div>
        ))}
        <button className="btn btn-primary" style={{marginTop:8}}
          onClick={handleVote} disabled={loading||choices.length!==2}>
          {loading ? 'Opslaan...' : 'Stem versturen →'}
        </button>
      </div>
    </div>
  );
}

// ── HOME SCREEN ──────────────────────────────────────────────────
function HomeScreen({ profile, checkins, todayMeal, onCheckin, onLogMeal, onVote }) {
  const today = new Date();
  const isFriday = today.getDay() === 5;

  // Bouw weekoverzicht: ma-zo
  const week = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - today.getDay() + 1 + i);
    const ds = d.toISOString().split('T')[0];
    const ci = checkins.find(c => c.eaten_at === ds);
    week.push({ day: DAYS[(i+1)%7], score: ci?.score ?? null });
  }

  const streak = checkins.reduce((acc, _, i, arr) => {
    const d = new Date(); d.setDate(d.getDate()-i);
    return arr[i]?.eaten_at === d.toISOString().split('T')[0] ? acc+1 : acc;
  }, 0);

  const isChild = profile.role === 'child';
  const hasCheckedIn = todayMeal && checkins.some(c => c.meal_id === todayMeal?.id);

  return (
    <div className="home-screen pb-nav">
      <div className="greeting-block">
        <h1 className="greeting">Hey <span>{profile.name}</span> 👋</h1>
        <p className="greeting-sub">{new Date().toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'})}</p>
        {streak > 1 && (
          <div className="streak-pill">🔥 {streak} dagen op rij!</div>
        )}
      </div>

      {/* Vandaag card */}
      {isChild ? (
        <div className="today-card">
          <div className="today-label">Vanavond</div>
          {!todayMeal ? (
            <>
              <div className="today-question">Nog geen maaltijd gelogd door je ouder.</div>
            </>
          ) : hasCheckedIn ? (
            <div className="today-done">✓ Check-in gedaan voor vandaag!</div>
          ) : (
            <>
              <div className="today-question">Hoe was de {todayMeal.meal_type} vanavond?</div>
              <button className="btn-white" onClick={onCheckin}>Check in → <span>8 sec</span></button>
            </>
          )}
        </div>
      ) : (
        <div className="today-card">
          <div className="today-label">Vandaag</div>
          {todayMeal ? (
            <div className="today-done">✓ {MEALS.find(m=>m.id===todayMeal.meal_type)?.emoji} {todayMeal.meal_type} gelogd</div>
          ) : (
            <>
              <div className="today-question">Wat eten jullie vanavond?</div>
              <button className="btn-white" onClick={onLogMeal}>Log maaltijd →</button>
            </>
          )}
        </div>
      )}

      {/* Week overzicht */}
      <div className="section-header">Deze week</div>
      <div className="week-dots">
        {week.map((d,i) => (
          <div key={i} className="week-dot-wrap">
            <div className={`week-dot ${d.score?`score-${d.score}`:''}`}>
              {d.score===1?'😕':d.score===2?'😐':d.score===3?'😋':''}
            </div>
            <div className="week-dot-label">{d.day}</div>
          </div>
        ))}
      </div>

      {/* Inzicht */}
      {checkins.length >= 3 && (
        <>
          <div className="section-header">Inzicht</div>
          <div className="insight-card">
            <div className="insight-label">AI observatie</div>
            <div className="insight-text">
              {checkins.filter(c=>c.ate_together).length > checkins.filter(c=>!c.ate_together).length
                ? `${profile.name} geeft eten een hogere score als jullie samen eten. 🤝`
                : `Check of samen eten het eten leuker maakt voor ${profile.name}. 💬`
              }
            </div>
          </div>
        </>
      )}

      {/* Vrijdag stem */}
      {isFriday && isChild && (
        <>
          <div className="section-header">Het is vrijdag! 🗳️</div>
          <div className="card" style={{margin:'0 16px'}}>
            <p style={{fontSize:14,color:'var(--text-muted)',marginBottom:12,lineHeight:1.5}}>
              Kies twee maaltijden die je volgende week wilt eten. Jouw stem telt mee!
            </p>
            <button className="btn btn-primary" onClick={onVote}>Stem nu →</button>
          </div>
        </>
      )}
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  const [screen, setScreen] = useState('home'); // home | checkin | log | vote | success
  const [successScore, setSuccessScore] = useState(null);
  const [todayMeal, setTodayMeal] = useState(null);
  const [checkins, setCheckins] = useState([]);
  const [tab, setTab] = useState('home'); // home | log | vote

  // Auth listener
  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      if (session) loadProfile(session.user);
      else setLoading(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, session) => {
      setSession(session);
      if (session) loadProfile(session.user);
      else { setProfile(null); setLoading(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  async function loadProfile(user) {
    setLoading(true);
    const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
    setProfile(data);
    if (data) {
      await loadData(data);
    }
    setLoading(false);
  }

  async function loadData(p) {
    // Vandaag's maaltijd
    const { data: meal } = await sb.from('meals')
      .select('*').eq('family_id', p.family_id).eq('eaten_at', todayStr()).single();
    setTodayMeal(meal || null);

    // Check-ins van afgelopen 14 dagen
    const since = new Date(); since.setDate(since.getDate()-14);
    const { data: cis } = await sb.from('checkins_with_context')
      .select('*').eq('profile_id', p.id)
      .gte('eaten_at', since.toISOString().split('T')[0])
      .order('eaten_at', { ascending: false });
    setCheckins(cis || []);
  }

  async function handleSignOut() {
    await sb.auth.signOut();
  }

  function handleCheckinDone(score) {
    setSuccessScore(score);
    setScreen('success');
    loadData(profile);
  }

  function handleLogDone() {
    setScreen('home');
    loadData(profile);
  }

  // ── Render tree ──
  if (loading) return (
    <div className="app-shell">
      <div className="loading">
        <div className="spinner"></div>
        <div className="loading-text">Laden...</div>
      </div>
    </div>
  );

  if (!session) return <AuthScreen onAuth={() => {}} />;
  if (!profile) return <SetupScreen user={session.user} onDone={() => loadProfile(session.user)} />;

  if (screen === 'checkin' && todayMeal) return (
    <div className="app-shell">
      <CheckinScreen
        profile={profile}
        meal={todayMeal}
        onDone={handleCheckinDone}
        onSkip={() => setScreen('home')}
      />
    </div>
  );

  if (screen === 'log') return (
    <div className="app-shell">
      <ParentLogScreen profile={profile} onDone={handleLogDone} />
    </div>
  );

  if (screen === 'vote') return (
    <div className="app-shell">
      <VoteScreen profile={profile} onDone={() => { setScreen('home'); loadData(profile); }} />
    </div>
  );

  if (screen === 'success') return (
    <div className="app-shell">
      <SuccessScreen score={successScore} onBack={() => setScreen('home')} />
    </div>
  );

  return (
    <div className="app-shell">
      <div className="topbar">
        <div className="logo">Lekker<span>stemmen</span></div>
        <button className="avatar-btn" onClick={handleSignOut} title="Uitloggen">
          {initials(profile.name)}
        </button>
      </div>

      <HomeScreen
        profile={profile}
        checkins={checkins}
        todayMeal={todayMeal}
        onCheckin={() => setScreen('checkin')}
        onLogMeal={() => setScreen('log')}
        onVote={() => setScreen('vote')}
      />

      {/* Bottom nav */}
      <nav className="bottom-nav">
        <button className={`nav-item ${tab==='home'?'active':''}`} onClick={()=>{setTab('home');setScreen('home')}}>
          <span className="nav-icon">🏠</span>
          <span className="nav-label">Home</span>
        </button>
        {profile.role === 'child' ? (
          <button className={`nav-item ${screen==='checkin'?'active':''}`} onClick={()=>todayMeal&&setScreen('checkin')}>
            <span className="nav-icon">😋</span>
            <span className="nav-label">Check-in</span>
          </button>
        ) : (
          <button className={`nav-item ${screen==='log'?'active':''}`} onClick={()=>setScreen('log')}>
            <span className="nav-icon">📋</span>
            <span className="nav-label">Log</span>
          </button>
        )}
        <button className={`nav-item ${screen==='vote'?'active':''}`} onClick={()=>setScreen('vote')}>
          <span className="nav-icon">🗳️</span>
          <span className="nav-label">Stem</span>
        </button>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
